<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>メールアドレスの確認</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f5;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;padding:40px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <p style="margin:0;font-size:22px;font-weight:700;color:#4F46E5;">Enthink</p>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:16px;">
              <p style="margin:0;font-size:16px;font-weight:600;color:#1a1a1a;">メールアドレスの確認</p>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:24px;">
              <p style="margin:0;font-size:14px;color:#555;line-height:1.7;">
                メールアドレスの変更リクエストを受け付けました。<br />
                以下のボタンをクリックして、変更を確認してください。
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <a href="{{ .ConfirmationURL }}"
                style="display:inline-block;padding:12px 32px;background-color:#4F46E5;color:#ffffff;font-size:14px;font-weight:600;text-decoration:none;border-radius:8px;">
                メールアドレスを確認する
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding-top:16px;border-top:1px solid #eee;">
              <p style="margin:0;font-size:12px;color:#999;line-height:1.6;">
                このメールに心当たりがない場合は、無視していただいて構いません。<br />
                リンクの有効期限は1時間です。
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
